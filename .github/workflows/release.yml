name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce  # v2.0.0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2  # v11.6
        with:
          vcpkgGitCommitId: 'dbbd673624c057174dd51ef85758951032717715'

      - name: Integrate vcpkg with MSBuild
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" integrate install

      - name: Build LuminaCpp
        shell: pwsh
        run: |
          msbuild LuminaCpp\LuminaCpp.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            "/p:SolutionDir=$env:GITHUB_WORKSPACE\" `
            /m

      - name: Build LuminaShell
        shell: pwsh
        run: |
          msbuild LuminaShell\LuminaShell.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            "/p:SolutionDir=$env:GITHUB_WORKSPACE\" `
            /m

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion="${{ steps.version.outputs.VERSION }}" installer\lumina.iss

      - name: Install WiX Toolset v4
        shell: pwsh
        run: dotnet tool install --global wix --version "4.0.6"

      - name: Build MSI
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          wix build installer\lumina.wxs `
            -d Version="$ver" `
            -o "installer\output\Lumina-$ver-x64.msi"

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path "installer\output" | Out-Null
          Compress-Archive `
            -Path "x64\Release\LuminaCpp.exe",
                  "x64\Release\LuminaShell.dll",
                  "installer\PORTABLE_README.txt" `
            -DestinationPath "installer\output\Lumina-$ver-x64-Portable.zip"

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem "installer\output\Lumina-*" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Add-Content "installer\output\SHA256SUMS.txt"
          }

      - name: Attest artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: |
            installer/output/Lumina-*-x64-Setup.exe
            installer/output/Lumina-*-x64.msi
            installer/output/Lumina-*-x64-Portable.zip

      - name: Extract release notes from tag
        id: relnotes
        shell: bash
        run: |
          {
            echo 'BODY<<EOF'
            git tag -l --format='%(contents)' "${{ github.ref_name }}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          name: "Lumina v${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.relnotes.outputs.BODY }}
          draft: false
          prerelease: false
          files: |
            installer/output/Lumina-*-x64-Setup.exe
            installer/output/Lumina-*-x64.msi
            installer/output/Lumina-*-x64-Portable.zip
            installer/output/SHA256SUMS.txt
